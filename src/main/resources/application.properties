spring.application.name=

# --- PostgreSQL datasource ---
# If 'postgres/postgres' fails on Homebrew Postgres, set the password once with:
#   psql postgres -c "ALTER USER postgres PASSWORD 'postgres';"
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=

# --- JPA / Hibernate ---
# ddl-auto=update is fine for learning. In production, use Flyway or Liquibase.
spring.jpa.hibernate.ddl-auto=
spring.jpa.show-sql=
spring.jpa.properties.hibernate.format_sql=
spring.jpa.database-platform=

server.port=

# JWT signing secret — override via environment variable JWT_SECRET in production
jwt.secret=

# --- Email / SMTP (override via env vars in production) ---
spring.mail.host=
spring.mail.port=
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=
spring.mail.properties.mail.smtp.starttls.enable=
spring.mail.from=
