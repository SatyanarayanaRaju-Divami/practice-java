spring.application.name=practice-java

# --- PostgreSQL datasource ---
# If 'postgres/postgres' fails on Homebrew Postgres, set the password once with:
#   psql postgres -c "ALTER USER postgres PASSWORD 'postgres';"
spring.datasource.url=jdbc:postgresql://localhost:5432/practice_java
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# ddl-auto=update is fine for learning. In production, use Flyway or Liquibase.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=8080
